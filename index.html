<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoufStock ERP/WMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#4ade80;
--primary-dark:#22c55e;
--bg:#0b1120;
--bg-card:rgba(17,24,39,0.75);
--bg-glass:rgba(255,255,255,0.035);
--border:rgba(255,255,255,0.07);
--border-light:rgba(255,255,255,0.14);
--text:#f1f5f9;
--text-muted:#94a3b8;
--text-dim:#64748b;
--accent-red:#ef4444;
--font:'Inter','Noto Sans Arabic',-apple-system,BlinkMacSystemFont,sans-serif;
}

html{
font-size:16px;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}

body{
font-family:var(--font);
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:var(--text);
overflow:hidden;
position:relative;
}

/* Animated gradient background */
body::before{
content:'';
position:absolute;
inset:0;
background:
radial-gradient(ellipse at 20% 80%,rgba(74,222,128,0.06) 0%,transparent 50%),
radial-gradient(ellipse at 80% 20%,rgba(34,197,94,0.04) 0%,transparent 50%),
radial-gradient(ellipse at 50% 50%,rgba(74,222,128,0.02) 0%,transparent 70%);
z-index:0;
animation:bgPulse 8s ease-in-out infinite;
}

@keyframes bgPulse{
0%,100%{opacity:1;}
50%{opacity:0.6;}
}

/* Noise texture overlay */
body::after{
content:'';
position:absolute;
inset:0;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
opacity:0.4;
pointer-events:none;
z-index:1;
}

/* ===== LOADER ===== */
.loader{
text-align:center;
position:relative;
z-index:2;
}

/* Ring spinner with icon inside */
.spinner-wrap{
width:80px;
height:80px;
margin:0 auto 28px;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.spinner-ring{
position:absolute;
inset:0;
border-radius:50%;
border:3px solid rgba(74,222,128,0.08);
border-top-color:var(--primary);
animation:spin 1.1s linear infinite;
}

.spinner-ring::before{
content:'';
position:absolute;
inset:-6px;
border-radius:50%;
border:1.5px solid transparent;
border-top-color:rgba(74,222,128,0.15);
animation:spin 2s linear infinite reverse;
}

.spinner-icon{
width:36px;
height:36px;
background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 24px rgba(74,222,128,0.3);
animation:iconPulse 2s ease-in-out infinite;
position:relative;
z-index:2;
}

.spinner-icon i{
font-size:16px;
color:#0b1120;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

@keyframes iconPulse{
0%,100%{box-shadow:0 0 20px rgba(74,222,128,0.25);transform:scale(1);}
50%{box-shadow:0 0 36px rgba(74,222,128,0.45);transform:scale(1.05);}
}

.loader h2{
font-size:1.5rem;
font-weight:800;
letter-spacing:-0.5px;
margin-bottom:8px;
animation:fadeSlideUp 0.6s ease both;
}

.loader p{
color:var(--text-muted);
font-size:0.875rem;
animation:fadeSlideUp 0.6s 0.15s ease both;
}

/* Progress bar under loader */
.loader-progress{
width:180px;
height:3px;
background:rgba(255,255,255,0.06);
border-radius:3px;
margin:20px auto 0;
overflow:hidden;
animation:fadeSlideUp 0.6s 0.3s ease both;
}

.loader-progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--primary),var(--primary-dark));
border-radius:3px;
animation:progressFill 2.5s ease-in-out infinite;
}

@keyframes progressFill{
0%{width:0%;margin-left:0;}
50%{width:70%;margin-left:0;}
100%{width:0%;margin-left:100%;}
}

/* ===== SESSION CARD ===== */
.card{
display:none;
width:420px;
max-width:calc(100vw - 40px);
background:var(--bg-card);
backdrop-filter:blur(40px);
-webkit-backdrop-filter:blur(40px);
border:1px solid var(--border);
border-radius:24px;
padding:36px 32px;
text-align:center;
box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03) inset;
position:relative;
z-index:2;
animation:cardAppear 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
overflow:visible;
}

.card::before{
content:'';
position:absolute;
top:0;
left:20px;
right:20px;
height:1px;
background:linear-gradient(90deg,transparent,rgba(74,222,128,0.3),transparent);
}

/* User avatar ring */
.avatar-wrap{
width:72px;
height:72px;
margin:0 auto 20px;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.avatar-ring{
position:absolute;
inset:0;
border-radius:50%;
border:2px solid rgba(74,222,128,0.2);
animation:avatarPulse 3s ease-in-out infinite;
}

.avatar-ring::before{
content:'';
position:absolute;
inset:-4px;
border-radius:50%;
border:1px solid rgba(74,222,128,0.08);
}

.avatar-icon{
width:56px;
height:56px;
background:linear-gradient(135deg,rgba(74,222,128,0.12) 0%,rgba(34,197,94,0.04) 100%);
border:2px solid rgba(74,222,128,0.25);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:2;
}

.avatar-icon i{
font-size:22px;
color:var(--primary);
}

@keyframes avatarPulse{
0%,100%{box-shadow:0 0 20px rgba(74,222,128,0.1);}
50%{box-shadow:0 0 40px rgba(74,222,128,0.25);}
}

.card h2{
font-size:1.5rem;
font-weight:800;
letter-spacing:-0.5px;
margin-bottom:6px;
}

.card .subtitle{
color:var(--primary);
font-size:0.75rem;
font-weight:600;
letter-spacing:1.5px;
text-transform:uppercase;
margin-bottom:14px;
}

.card p{
color:var(--text-muted);
font-size:0.875rem;
line-height:1.7;
margin-bottom:28px;
}

/* Session info row */
.session-info{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-bottom:24px;
padding:10px 16px;
background:rgba(74,222,128,0.06);
border:1px solid rgba(74,222,128,0.1);
border-radius:12px;
font-size:0.8125rem;
color:var(--text-muted);
}

.session-info i{
color:var(--primary);
font-size:0.875rem;
}

.session-info .dot{
width:6px;
height:6px;
background:var(--primary);
border-radius:50%;
animation:dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse{
0%,100%{opacity:1;transform:scale(1);}
50%{opacity:0.4;transform:scale(0.7);}
}

/* Buttons */
.buttons{
display:flex;
gap:12px;
}

.btn{
flex:1;
height:50px;
border:none;
border-radius:14px;
font-size:0.875rem;
font-weight:700;
font-family:var(--font);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
position:relative;
overflow:hidden;
}

.btn i{
font-size:0.875rem;
transition:transform 0.3s ease;
}

.btn-primary{
background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
color:#0b1120;
box-shadow:0 4px 20px rgba(74,222,128,0.3);
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 8px 30px rgba(74,222,128,0.4);
}

.btn-primary:hover i{
transform:translateX(-3px);
}

.btn-primary:active{
transform:translateY(0);
}

.btn-secondary{
background:rgba(255,255,255,0.05);
color:var(--text);
border:1px solid var(--border);
}

.btn-secondary:hover{
background:rgba(255,255,255,0.08);
border-color:var(--border-light);
transform:translateY(-2px);
}

.btn-secondary:hover i{
transform:translateX(3px);
}

.btn-secondary:active{
transform:translateY(0);
}

/* Footer */
.card-footer{
margin-top:24px;
padding-top:16px;
border-top:1px solid var(--border);
font-size:0.6875rem;
color:var(--text-dim);
display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

.card-footer i{
color:var(--primary);
font-size:0.625rem;
}

/* Animations */
@keyframes fadeSlideUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes cardAppear{
from{opacity:0;transform:scale(0.92) translateY(24px);}
to{opacity:1;transform:scale(1) translateY(0);}
}

/* Responsive */
@media(max-width:480px){
.card{padding:28px 20px;border-radius:20px;}
.buttons{flex-direction:column;}
.btn{width:100%;}
}

</style>

<base target="_blank">
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">

<div class="spinner-wrap">
<div class="spinner-ring"></div>
<div class="spinner-icon"><i class="fa-solid fa-cubes-stacked"></i></div>
</div>

<h2>SoufStock ERP/WMS</h2>

<p>Vérification de la session en cours...</p>

<div class="loader-progress">
<div class="loader-progress-bar"></div>
</div>

</div>

<!-- SESSION CARD -->
<div class="card" id="sessionCard">

<div class="avatar-wrap">
<div class="avatar-ring"></div>
<div class="avatar-icon"><i class="fa-solid fa-user-shield"></i></div>
</div>

<h2>Bienvenue de retour</h2>
<div class="subtitle">Session active</div>

<p>Votre session est toujours valide.<br>Choisissez comment poursuivre.</p>

<div class="session-info">
<i class="fa-solid fa-shield-halved"></i>
<span>Authentification sécurisée</span>
<div class="dot"></div>
</div>

<div class="buttons">

<button class="btn btn-primary" id="continueBtn">
<i class="fa-solid fa-arrow-right"></i>
<span>Continuer</span>
</button>

<button class="btn btn-secondary" id="logoutBtn">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Changer de compte</span>
</button>

</div>

<div class="card-footer">
<i class="fa-solid fa-lock"></i>
<span>SoufStock ERP/WMS &middot; v1.0.0</span>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>

async function checkSession(){
try{
const{data}=await supabaseClient.auth.getSession();
if(data.session){
document.getElementById("loader").style.display="none";
document.getElementById("sessionCard").style.display="block";
}else{
window.location.href="login.html";
}
}catch(e){
window.location.href="login.html";
}
}

document.getElementById("continueBtn").onclick=function(){
window.location.href="dashboard.html";
};

document.getElementById("logoutBtn").onclick=async function(){
await supabaseClient.auth.signOut();
window.location.href="login.html";
};

checkSession();

</script>

</body>
</html>
